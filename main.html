<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	
	<div class="container"><form class="need-validation">
		<div><label for="first-name-input" class="form-label">First Name</label>
		<input type="text" id="first-name-input" class="form-control" required>
		
	
	<div class="invalid-feedback">First name required!</div>
		</div>
		<div>
		<label for="last-name-input">Last Name</label>
		<input type="text" id="last-name-input" class="form-control" required>
		<div  class="invalid-feedback">Last name required!</div></div>
	
		<div><label for="email-input" class="form-lable">Email Address</label>
	
		<input type="email" id="email-input" placeholder="xyz@abc.com"required class="form-control">
		<div class="invalid-feedback">Email required!</div></div>
		<div><label for="college-input" class="form-control">College</label>
		<input type="text" id="college-input" required class="form-control">
		<div class="invalid-feedback">Please provide a valid college</div></div>
		
		
     <div><label for="grad-year-select" class="form-label">Graduation Year</label>

      <select id="grad-year-select" class="form-select" required>
        <option value="">Choose...</option>
        <option>2020</option>
        <option>2021</option>
        <option>2022</option>
        <option>2023</option>
      </select>
	 <div class="invalid-feedback">Please select a valid Graduation Year</div></div>
			
		
		<div><label for="roll-no-input" class="form-label">Roll No.</label>
		<input type="text" id="roll-no-input" required class="form-control">
		<div class="invalid-feedback">Please provide a valid Roll no</div></div>
		<div><label for="conditions-checkbox" class="form-label">Agree to terms and conditions</label>
		
		<input type="checkbox" id="conditions-checkbox" required class="form-check-input">
		<div class="invalid-feedback">you must agree before submiting</div></div>
	<button>Submit form</button>
	</form>
	</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
