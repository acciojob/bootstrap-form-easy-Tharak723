<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	
	<div class="container"><form class="need-validation">
		<div><label>First Name</label>
		<input type="text" id="first-name-input" class="form-control" required>
			<div class="invalid-feedback">First name required!</div>
		</div>
		<div>
		<label>Last Name</label>
		<input type="text" id="last-name-input" class="form-control" required>
		<div>Last name required!</div></div>
		<div><label>Email Address</label>
	
		<input type="email" id="email-input" value="xyz@abc.com"required class="form-control">
		<div>Email required!</div></div>
		<div><label>College</label>
		<input type="text" id="college-input" required class="form-control">
		<div>Please provide a valid college</div></div>
		
		
     <div><label>Graduation Year</label>

      <select id="grad-year-select" class="form-control" required>
        <option value="">Choose...</option>
        <option>2020</option>
        <option>2021</option>
        <option>2022</option>
        <option>2023</option>
      </select>
	 <div>Please select a valid Graduation Year</div></div>
			
		
		<div><label>Roll No.</label>
		<input type="text" id="roll-no-input" required class="form-control">
		<div>Please provide a valid Roll no</div></div>
		<div><label>Agree to terms and conditions</label>
		<div></div></div>
		<input type="checkbox" required class="form-control">
		<div>you must agree before submiting</div></div>
	<button>Submit form</button>
	</form>
	</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
